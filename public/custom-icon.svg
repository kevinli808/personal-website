<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <defs>
    <!-- Dark Mode Emerald Gradient -->
    <linearGradient id="circle-grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>

    <!-- Light Mode Emerald Gradient -->
    <linearGradient id="circle-grad-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#0284C7" />
    </linearGradient>
  </defs>

  <style>
    .circle-frame {
      fill: var(--bg-surface, #080c14);
      stroke: var(--border-color, rgba(255, 255, 255, 0.12));
      transition: all 0.25s ease;
    }
    .circle-chevron {
      stroke: var(--text-primary, #f8fafc);
      transition: stroke 0.25s ease;
    }
    .circle-cursor {
      stroke: url(#circle-grad-dark);
    }

    /* Light Mode Overrides */
    [data-theme="light"] .circle-frame { 
      fill: #ffffff; 
      stroke: rgba(0, 0, 0, 0.08); 
    }
    [data-theme="light"] .circle-chevron { 
      stroke: #0f172a; 
    }
    [data-theme="light"] .circle-cursor { 
      stroke: url(#circle-grad-light);
    }
  </style>

  <!-- Circular Outer Frame -->
  <circle class="circle-frame" cx="32" cy="32" r="27" stroke-width="1.25" />

  <!-- Terminal Chevron (>) -->
  <path class="circle-chevron" d="M 20 22 L 31 32 L 20 42" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Minimal Terminal Cursor (_) -->
  <line class="circle-cursor" x1="36" y1="42" x2="45" y2="42" stroke-width="3" stroke-linecap="round" />
</svg>
